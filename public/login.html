<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Reformas Madrid</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23c8102e'/%3E%3Ctext x='16' y='23' font-size='19' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3ER%3C/text%3E%3C/svg%3E" />
</head>
<body class="admin-body">
  <div class="gate">
    <form class="gate-card" id="loginForm">
      <span class="brand-logo" aria-hidden="true" style="background:linear-gradient(135deg,#c8102e,#e23b52)">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </span>
      <h2>Panel de administración</h2>
      <p>Inicia sesión para gestionar el directorio.</p>
      <input type="text" class="input" id="username" placeholder="Usuario" autocomplete="username" value="admin" />
      <input type="password" class="input" id="password" placeholder="Contraseña" autocomplete="current-password" />
      <div class="gate-err" id="err"></div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Entrar</button>
      <div class="gate-hint">Configura usuario y contraseña en el archivo <code>.env</code>. Por defecto: <b>admin</b> / <b>admin</b>.</div>
      <div style="margin-top:14px"><a href="/" style="font-size:13px">← Volver al directorio</a></div>
    </form>
  </div>

  <script src="assets/js/ui.js"></script>
  <script src="assets/js/api.js"></script>
  <script>
    const $ = s => document.querySelector(s);
    // Dacă deja autentificat, mergi direct în admin
    DDM.api.me().then(r => { if (r && r.user) location.replace('admin.html'); }).catch(() => {});
    $('#loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      $('#err').textContent = '';
      $('#submitBtn').disabled = true;
      try {
        await DDM.api.login($('#username').value.trim(), $('#password').value);
        location.replace('admin.html');
      } catch (err) {
        $('#err').textContent = err.status === 401 ? 'Usuario o contraseña incorrectos' : 'Error de conexión con el servidor';
        $('#password').select();
      } finally { $('#submitBtn').disabled = false; }
    });
    $('#password').focus();
  </script>
</body>
</html>
