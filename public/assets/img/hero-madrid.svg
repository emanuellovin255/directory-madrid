<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Skyline de Madrid (imagen de ejemplo)">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a0a12"/>
      <stop offset="0.45" stop-color="#7a1226"/>
      <stop offset="0.78" stop-color="#c8102e"/>
      <stop offset="1" stop-color="#e8663f"/>
    </linearGradient>
    <linearGradient id="city" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0509"/>
      <stop offset="1" stop-color="#360a14"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd9a0" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#ffb066" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffb066" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="640" fill="url(#sky)"/>
  <circle cx="1120" cy="430" r="230" fill="url(#sun)"/>
  <circle cx="1120" cy="440" r="90" fill="#ffdca6" opacity="0.9"/>
  <!-- Skyline silhouette -->
  <g fill="url(#city)">
    <!-- left low-rise -->
    <rect x="0" y="470" width="90" height="170"/>
    <rect x="70" y="440" width="70" height="200"/>
    <rect x="130" y="410" width="60" height="230"/>
    <!-- Puerta de Europa (leaning towers) -->
    <polygon points="210,640 210,300 300,270 300,640"/>
    <polygon points="330,640 330,270 420,300 420,640"/>
    <!-- mid blocks -->
    <rect x="440" y="360" width="70" height="280"/>
    <rect x="510" y="300" width="46" height="340"/>
    <rect x="556" y="390" width="80" height="250"/>
    <!-- dome (Metrópolis nod) -->
    <rect x="650" y="410" width="110" height="230"/>
    <path d="M650 410 a55 55 0 0 1 110 0 Z"/>
    <rect x="700" y="330" width="10" height="90"/>
    <!-- towers cluster -->
    <rect x="780" y="250" width="52" height="390"/>
    <polygon points="806,250 792,210 820,210"/>
    <rect x="845" y="340" width="66" height="300"/>
    <rect x="915" y="300" width="40" height="340"/>
    <!-- Torre de Cristal tapered -->
    <polygon points="1290,640 1305,180 1345,180 1360,640"/>
    <rect x="1380" y="330" width="70" height="310"/>
    <rect x="1450" y="380" width="60" height="260"/>
    <rect x="1510" y="300" width="46" height="340"/>
    <rect x="1556" y="430" width="44" height="210"/>
    <!-- foreground rooftops -->
    <rect x="960" y="470" width="120" height="170"/>
    <rect x="1075" y="430" width="70" height="210"/>
    <rect x="1145" y="500" width="150" height="140"/>
  </g>
  <rect x="0" y="600" width="1600" height="40" fill="#12040a"/>
</svg>
